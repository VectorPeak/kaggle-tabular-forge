    reason: P4 candidate factory MVP implemented with matrix, factory, CLI, docs, tests, and multi-agent review fixes.
  verification:
    run_at: "2026-06-09"
    commands:
      - command: uv run pytest -q
        result: 35 passed in 59.69s
      - command: uv run ruff check .
        result: All checks passed!
      - command: uv run ktab validate-config --config configs\matrices\p04_churn_candidate_factory.example.yaml --schema configs\schemas\matrix.schema.json
        result: valid
      - command: uv run ktab validate-config --config configs\goals\p04_candidate_factory.goal.yaml --schema configs\schemas\goal.schema.json
        result: valid
      - command: uv run ktab factory --config configs\matrices\p04_churn_candidate_factory.example.yaml --dry-run --max-runs 1
        result: "status: planned planned: 1 completed: 0 failed: 0"
    agent_review_fixes:
      - validate duplicate experiment_id values across the full matrix before max_runs truncation
      - record skipped candidates when continue_on_error is false and a prior run fails
      - reject unsafe matrix axes that can override artifact paths or competition routing
      - require strict boolean continue_on_error and positive report.top_n
      - escape Markdown report table cells and include config_hash/config_path for failed runs

