# P5.0 stacking preflight example.
# This prepares stack matrices and selection artifacts only.
# It does not train a stacker or write a completed registry row.
#
# Run:
# uv run ktab stack --config configs\stacking.example.yaml

stacking:
  experiment_id: p05-stack-preflight-example
  competition: playground-series-s6e3
  artifact_root: artifacts
  target: Churn
  id_column: id
  metric_name: roc_auc
  candidate_ids:
    - p02-logistic-basic-example
    - p02-lgbm-basic-example
  top_n: 10
  max_parents: 2
  min_parents: 2
  selection:
    strategy: score_desc
    max_pairwise_corr: 0.995
    report_top_k_pairs: 10
  stacker:
    method: logistic_regression
    params:
      C: 1.0
      max_iter: 200
