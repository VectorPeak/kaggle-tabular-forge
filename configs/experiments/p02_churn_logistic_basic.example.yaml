experiment:
  experiment_id: p02-logistic-basic-example
  competition: playground-series-s6e3
  hypothesis: Logistic regression smoke baseline with basic inferred tabular features.
  seed: 42
  run_mode: smoke
  tags:
    - p02
    - logistic
    - basic

data:
  data_dir: data/playground-series-s6e3/raw
  artifact_root: artifacts
  target: Churn
  id_column: id

validation:
  strategy: stratified_kfold
  n_splits: 5
  shuffle: true
  seed: 42

features:
  feature_set: basic_inferred
  families:
    - basic

model:
  family: logistic_regression
  preset: baseline
  params:
    max_iter: 1000

outputs:
  experiment_dir: artifacts/experiments/playground-series-s6e3/p02-logistic-basic-example
  oof_dir: artifacts/oof/playground-series-s6e3/p02-logistic-basic-example
  submission_dir: artifacts/submissions/playground-series-s6e3/p02-logistic-basic-example
