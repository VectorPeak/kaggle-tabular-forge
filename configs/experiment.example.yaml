# Single-experiment runtime configuration.
# Human-edited YAML. Validate with configs/schemas/experiment.schema.json.

experiment:
  experiment_id: p02-lgbm-basic-example
  competition: playground-series-s6e3
  hypothesis: LightGBM smoke baseline with basic inferred features.
  seed: 42
  run_mode: smoke
  tags:
    - p2
    - baseline
    - lightgbm

data:
  data_dir: data/playground-series-s6e3/raw
  artifact_root: artifacts
  target: Churn
  id_column: id

validation:
  strategy: stratified_kfold
  n_splits: 3
  shuffle: true
  seed: 42

features:
  feature_set: basic_inferred
  families:
    - basic

model:
  family: lightgbm
  preset: baseline
  params:
    learning_rate: 0.05
    n_estimators: 200
    num_leaves: 31
